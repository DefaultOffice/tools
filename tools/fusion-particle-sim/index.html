<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuclear Fusion Particle Sim | Default Office Tools</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
        }

        /* Password overlay */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .password-overlay.hidden {
            display: none;
        }

        .password-box {
            text-align: center;
        }

        .password-box h2 {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        .password-box input {
            background: #252525;
            border: 1px solid #444;
            color: #fff;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            width: 240px;
            text-align: center;
            outline: none;
        }

        .password-box input:focus {
            border-color: #666;
        }

        .password-box button {
            display: block;
            width: 100%;
            margin-top: 12px;
            padding: 12px 16px;
            background: #fff;
            color: #1a1a1a;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .password-box button:hover {
            background: #ddd;
        }

        .password-box input::placeholder {
            color: #555;
        }

        .password-error {
            color: #e54;
            font-size: 12px;
            margin-top: 12px;
            opacity: 0;
        }

        .password-error.show {
            opacity: 1;
        }

        .app-container {
            display: none;
            width: 100%;
        }

        .app-container.visible {
            display: flex;
        }

        .sidebar {
            width: 340px;
            background: #252525;
            display: flex;
            flex-direction: column;
            height: 100vh;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid #333;
        }

        .back-link {
            display: inline-block;
            font-size: 12px;
            color: #666;
            text-decoration: none;
            margin-bottom: 8px;
        }

        .back-link:hover {
            color: #aaa;
        }

        .sidebar-header h1 {
            font-size: 13px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }

        .control-section {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #333;
        }

        .control-section:last-child {
            border-bottom: none;
        }

        .control-section h2 {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
        }

        .control-row label {
            font-size: 11px;
            color: #aaa;
            width: 90px;
            flex-shrink: 0;
        }

        .control-row input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #444;
            border-radius: 2px;
            outline: none;
        }

        .control-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        .control-row input[type="number"] {
            width: 55px;
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        .control-row input[type="color"] {
            width: 36px;
            height: 24px;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
        }

        .control-row input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .control-row input[type="color"]::-webkit-color-swatch {
            border: 1px solid #555;
            border-radius: 4px;
        }

        .control-row .value-input {
            font-size: 11px;
            color: #fff;
            width: 55px;
            text-align: right;
            background: #333;
            border: 1px solid #444;
            border-radius: 3px;
            padding: 2px 5px;
            flex-shrink: 0;
        }

        .control-row .value-input:focus {
            outline: none;
            border-color: #4a9eff;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            gap: 6px;
        }

        .checkbox-row input[type="checkbox"] {
            width: 14px;
            height: 14px;
            accent-color: #4a9eff;
        }

        .checkbox-row label {
            font-size: 11px;
            color: #aaa;
            cursor: pointer;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .btn-primary {
            background: #4a9eff;
            color: #fff;
        }

        .btn-primary:hover {
            background: #3a8eef;
        }

        .btn-play {
            background: #22c55e;
            color: #fff;
            min-width: 60px;
        }

        .btn-play:hover {
            background: #16a34a;
        }

        .btn-purple {
            background: #8b5cf6;
            color: #fff;
        }

        .btn-purple:hover {
            background: #7c3aed;
        }

        .btn-secondary {
            background: #444;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #555;
        }

        .btn-sm {
            padding: 4px 8px;
            font-size: 10px;
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: #252525;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }

        .top-bar-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .top-bar-section label {
            font-size: 11px;
            color: #666;
        }

        .top-bar-section input[type="number"] {
            width: 60px;
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        .top-bar-divider {
            width: 1px;
            height: 24px;
            background: #444;
        }

        .frame-display {
            font-size: 11px;
            color: #666;
            min-width: 80px;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #111;
            position: relative;
            overflow: auto;
        }

        #simCanvas {
            border: 1px solid #333;
        }

        .export-status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 12px;
            display: none;
        }

        .export-status.active {
            display: block;
        }

        .layer-color-preview {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            display: inline-block;
            margin-right: 4px;
            vertical-align: middle;
        }

        .version-tag {
            font-size: 10px;
            color: #555;
            margin-left: 8px;
        }

        .layers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 12px;
        }

        .credit-text {
            position: absolute;
            bottom: 16px;
            right: 20px;
            font-size: 14px;
            color: #666;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="password-overlay" id="passwordOverlay">
        <div class="password-box">
            <h2>Password Required</h2>
            <input type="password" id="passwordInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPassword()">
            <button onclick="checkPassword()">Unlock</button>
            <div class="password-error" id="passwordError">Incorrect password</div>
        </div>
    </div>

    <div class="app-container" id="appContainer">
    <div class="sidebar">
        <div class="sidebar-header">
            <a href="/" class="back-link">← Back</a>
            <h1>Nuclear Fusion Particle Sim <span class="version-tag">v3.0</span></h1>
        </div>
        <div class="sidebar-content">
            <div class="control-section">
                <h2>Camera</h2>
                <div class="control-row">
                    <label>Focal Length</label>
                    <input type="range" id="focalLength" min="20" max="200" value="85">
                    <input type="number" class="value-input" id="focalLengthVal" value="85">
                </div>
                <div class="control-row">
                    <label>Rotate X</label>
                    <input type="range" id="rotateX" min="-90" max="90" value="20">
                    <input type="number" class="value-input" id="rotateXVal" value="20">
                </div>
                <div class="control-row">
                    <label>Rotate Y</label>
                    <input type="range" id="rotateY" min="-180" max="180" value="30">
                    <input type="number" class="value-input" id="rotateYVal" value="30">
                </div>
                <div class="control-row">
                    <label>Zoom</label>
                    <input type="range" id="zoom" min="0.2" max="3" step="0.1" value="1">
                    <input type="number" class="value-input" id="zoomVal" value="1" step="0.1">
                </div>
                <div class="control-row">
                    <label>Size by Depth</label>
                    <input type="range" id="depthScale" min="0" max="2" step="0.1" value="1">
                    <input type="number" class="value-input" id="depthScaleVal" value="1" step="0.1">
                </div>
                <div class="control-row">
                    <label>Darken by Depth</label>
                    <input type="range" id="depthDarken" min="0" max="1" step="0.05" value="0.3">
                    <input type="number" class="value-input" id="depthDarkenVal" value="0.3" step="0.05">
                </div>
            </div>

            <div class="control-section">
                <h2>Container</h2>
                <div class="control-row">
                    <label>Width</label>
                    <input type="range" id="boundaryWidth" min="50" max="1000" value="400">
                    <input type="number" class="value-input" id="boundaryWidthVal" value="400">
                </div>
                <div class="control-row">
                    <label>Height</label>
                    <input type="range" id="boundaryHeight" min="50" max="1000" value="400">
                    <input type="number" class="value-input" id="boundaryHeightVal" value="400">
                </div>
                <div class="control-row">
                    <label>Depth</label>
                    <input type="range" id="boundaryDepth" min="50" max="1000" value="400">
                    <input type="number" class="value-input" id="boundaryDepthVal" value="400">
                </div>
                <div class="control-row">
                    <label>Chamfer</label>
                    <input type="range" id="chamferSize" min="0" max="200" value="50">
                    <input type="number" class="value-input" id="chamferSizeVal" value="50">
                </div>
                <div class="control-row">
                    <label>Stroke</label>
                    <input type="range" id="boundaryStroke" min="1" max="10" value="2">
                    <input type="number" class="value-input" id="boundaryStrokeVal" value="2">
                </div>
                <div class="control-row">
                    <label>Colour</label>
                    <input type="color" id="boundaryColor" value="#ffffff">
                    <input type="file" id="boundaryGradientFile" accept="image/*" style="display:none" onchange="loadGradientImage('boundary', event)">
                    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('boundaryGradientFile').click()">Gradient</button>
                    <button class="btn btn-secondary btn-sm" onclick="clearGradientImage('boundary')">×</button>
                    <span id="boundaryGradientStatus" style="font-size: 9px; color: #555;"></span>
                </div>
            </div>

            <div class="control-section">
                <h2>Lithium Particles</h2>
                <div class="control-row">
                    <label>Count</label>
                    <input type="range" id="lithiumCount" min="20" max="1000" value="200">
                    <input type="number" class="value-input" id="lithiumCountVal" value="200">
                </div>
                <div class="control-row">
                    <label>Size</label>
                    <input type="range" id="lithiumSize" min="2" max="50" value="10">
                    <input type="number" class="value-input" id="lithiumSizeVal" value="10">
                </div>
                <div class="control-row">
                    <label>Density Falloff</label>
                    <input type="range" id="densityFalloff" min="0.1" max="10" step="0.1" value="2">
                    <input type="number" class="value-input" id="densityFalloffVal" value="2" step="0.1">
                </div>
                <div class="control-row">
                    <label>Colour</label>
                    <input type="color" id="lithiumColor" value="#3366cc">
                    <input type="file" id="lithiumGradientFile" accept="image/*" style="display:none" onchange="loadGradientImage('lithium', event)">
                    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('lithiumGradientFile').click()">Gradient</button>
                    <button class="btn btn-secondary btn-sm" onclick="clearGradientImage('lithium')">×</button>
                    <span id="lithiumGradientStatus" style="font-size: 9px; color: #555;"></span>
                </div>
                <button class="btn btn-secondary" onclick="regenerateLithium()">Regenerate</button>
            </div>

            <div class="control-section">
                <h2>Neutrons</h2>
                <div class="control-row">
                    <label>Emission Rate</label>
                    <input type="range" id="emissionRate" min="0.1" max="20" step="0.1" value="1">
                    <input type="number" class="value-input" id="emissionRateVal" value="1" step="0.1">
                </div>
                <div class="control-row">
                    <label>Max Count</label>
                    <input type="range" id="maxNeutrons" min="1" max="100" value="10">
                    <input type="number" class="value-input" id="maxNeutronsVal" value="10">
                </div>
                <div class="control-row">
                    <label>Speed</label>
                    <input type="range" id="neutronSpeed" min="10" max="1000" value="200">
                    <input type="number" class="value-input" id="neutronSpeedVal" value="200">
                </div>
                <div class="control-row">
                    <label>Size</label>
                    <input type="range" id="neutronSize" min="2" max="50" value="8">
                    <input type="number" class="value-input" id="neutronSizeVal" value="8">
                </div>
                <div class="control-row">
                    <label>Colour</label>
                    <input type="color" id="neutronColor" value="#ffff00">
                    <input type="file" id="neutronGradientFile" accept="image/*" style="display:none" onchange="loadGradientImage('neutron', event)">
                    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('neutronGradientFile').click()">Gradient</button>
                    <button class="btn btn-secondary btn-sm" onclick="clearGradientImage('neutron')">×</button>
                    <span id="neutronGradientStatus" style="font-size: 9px; color: #555;"></span>
                </div>
                <div class="control-row">
                    <label>Trail Length</label>
                    <input type="range" id="neutronTrailLength" min="0" max="50" value="0">
                    <input type="number" class="value-input" id="neutronTrailLengthVal" value="0">
                </div>
                <div class="control-row">
                    <label>Trail Opacity</label>
                    <input type="range" id="neutronTrailOpacity" min="0" max="1" step="0.05" value="0.5">
                    <input type="number" class="value-input" id="neutronTrailOpacityVal" value="0.5" step="0.05">
                </div>
                <div class="control-row">
                    <label>Collision Start</label>
                    <input type="range" id="collisionStart" min="0" max="1" step="0.05" value="0.3">
                    <input type="number" class="value-input" id="collisionStartVal" value="0.3" step="0.05">
                </div>
                <div class="control-row">
                    <label>Collision Ramp</label>
                    <input type="range" id="collisionRamp" min="0.5" max="5" step="0.1" value="2">
                    <input type="number" class="value-input" id="collisionRampVal" value="2" step="0.1">
                </div>
            </div>

            <div class="control-section">
                <h2>Helium (Product)</h2>
                <div class="control-row">
                    <label>Size</label>
                    <input type="range" id="heliumSize" min="2" max="50" value="8">
                    <input type="number" class="value-input" id="heliumSizeVal" value="8">
                </div>
                <div class="control-row">
                    <label>Colour</label>
                    <input type="color" id="heliumColor" value="#ff00ff">
                    <input type="file" id="heliumGradientFile" accept="image/*" style="display:none" onchange="loadGradientImage('helium', event)">
                    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('heliumGradientFile').click()">Gradient</button>
                    <button class="btn btn-secondary btn-sm" onclick="clearGradientImage('helium')">×</button>
                    <span id="heliumGradientStatus" style="font-size: 9px; color: #555;"></span>
                </div>
                <div class="control-row">
                    <label>Trail Length</label>
                    <input type="range" id="heliumTrailLength" min="0" max="50" value="0">
                    <input type="number" class="value-input" id="heliumTrailLengthVal" value="0">
                </div>
                <div class="control-row">
                    <label>Trail Opacity</label>
                    <input type="range" id="heliumTrailOpacity" min="0" max="1" step="0.05" value="0.5">
                    <input type="number" class="value-input" id="heliumTrailOpacityVal" value="0.5" step="0.05">
                </div>
            </div>

            <div class="control-section">
                <h2>Tritium (Product)</h2>
                <div class="control-row">
                    <label>Size</label>
                    <input type="range" id="tritiumSize" min="2" max="50" value="8">
                    <input type="number" class="value-input" id="tritiumSizeVal" value="8">
                </div>
                <div class="control-row">
                    <label>Colour</label>
                    <input type="color" id="tritiumColor" value="#cc0000">
                    <input type="file" id="tritiumGradientFile" accept="image/*" style="display:none" onchange="loadGradientImage('tritium', event)">
                    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('tritiumGradientFile').click()">Gradient</button>
                    <button class="btn btn-secondary btn-sm" onclick="clearGradientImage('tritium')">×</button>
                    <span id="tritiumGradientStatus" style="font-size: 9px; color: #555;"></span>
                </div>
                <div class="control-row">
                    <label>Trail Length</label>
                    <input type="range" id="tritiumTrailLength" min="0" max="50" value="0">
                    <input type="number" class="value-input" id="tritiumTrailLengthVal" value="0">
                </div>
                <div class="control-row">
                    <label>Trail Opacity</label>
                    <input type="range" id="tritiumTrailOpacity" min="0" max="1" step="0.05" value="0.5">
                    <input type="number" class="value-input" id="tritiumTrailOpacityVal" value="0.5" step="0.05">
                </div>
            </div>

            <div class="control-section">
                <h2>Product Settings</h2>
                <div class="control-row">
                    <label>Speed</label>
                    <input type="range" id="productSpeed" min="10" max="500" value="100">
                    <input type="number" class="value-input" id="productSpeedVal" value="100">
                </div>
                <div class="control-row">
                    <label>Fade Distance</label>
                    <input type="range" id="fadeDistance" min="10" max="500" value="80">
                    <input type="number" class="value-input" id="fadeDistanceVal" value="80">
                </div>
            </div>

            <div class="control-section">
                <h2>Collision Flash</h2>
                <div class="control-row">
                    <label>Size</label>
                    <input type="range" id="flashSize" min="0" max="100" value="30">
                    <input type="number" class="value-input" id="flashSizeVal" value="30">
                </div>
                <div class="control-row">
                    <label>Colour</label>
                    <input type="color" id="flashColor" value="#ffffff">
                    <input type="file" id="flashGradientFile" accept="image/*" style="display:none" onchange="loadGradientImage('flash', event)">
                    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('flashGradientFile').click()">Gradient</button>
                    <button class="btn btn-secondary btn-sm" onclick="clearGradientImage('flash')">×</button>
                    <span id="flashGradientStatus" style="font-size: 9px; color: #555;"></span>
                </div>
                <div class="control-row">
                    <label>Fade In</label>
                    <input type="range" id="flashFadeIn" min="0" max="10" value="1">
                    <input type="number" class="value-input" id="flashFadeInVal" value="1">
                </div>
                <div class="control-row">
                    <label>Fade Out</label>
                    <input type="range" id="flashFadeOut" min="1" max="30" value="8">
                    <input type="number" class="value-input" id="flashFadeOutVal" value="8">
                </div>
                <div class="control-row">
                    <label>Glow Rings</label>
                    <input type="range" id="flashRings" min="1" max="5" value="3">
                    <input type="number" class="value-input" id="flashRingsVal" value="3">
                </div>
            </div>

            <div class="control-section">
                <h2>Layer Visibility</h2>
                <div class="layers-grid">
                    <div class="checkbox-row">
                        <input type="checkbox" id="showBoundary" checked>
                        <label for="showBoundary"><span class="layer-color-preview" id="boundaryPreview"></span>Container</label>
                    </div>
                    <div class="checkbox-row">
                        <input type="checkbox" id="showLithium" checked>
                        <label for="showLithium"><span class="layer-color-preview" id="lithiumPreview"></span>Lithium</label>
                    </div>
                    <div class="checkbox-row">
                        <input type="checkbox" id="showNeutrons" checked>
                        <label for="showNeutrons"><span class="layer-color-preview" id="neutronPreview"></span>Neutrons</label>
                    </div>
                    <div class="checkbox-row">
                        <input type="checkbox" id="showHelium" checked>
                        <label for="showHelium"><span class="layer-color-preview" id="heliumPreview"></span>Helium</label>
                    </div>
                    <div class="checkbox-row">
                        <input type="checkbox" id="showTritium" checked>
                        <label for="showTritium"><span class="layer-color-preview" id="tritiumPreview"></span>Tritium</label>
                    </div>
                    <div class="checkbox-row">
                        <input type="checkbox" id="showFlash" checked>
                        <label for="showFlash"><span class="layer-color-preview" id="flashPreview"></span>Flash</label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-area">
        <div class="top-bar">
            <div class="top-bar-section">
                <button class="btn btn-play" id="playBtn" onclick="togglePlay()">Play</button>

    <script>
        // Password protection
        const TOOL_PASSWORD = 'JVFusion';
        
        function checkPassword() {
            const input = document.getElementById('passwordInput');
            const error = document.getElementById('passwordError');
            
            if (input.value === TOOL_PASSWORD) {
                document.getElementById('passwordOverlay').classList.add('hidden');

        // Check if already authenticated this session
        if (sessionStorage.getItem('fusion-particle-sim-auth') === 'true') {
            document.getElementById('passwordOverlay').classList.add('hidden');
            document.getElementById('appContainer').classList.add('visible');
        }

        // Seeded random number generator (Mulberry32)
        let rngSeed = 12345;
        let rng;
        
        function mulberry32(a) {
            return function() {
                let t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }
        
        function initRng() {
            rngSeed = parseInt(document.getElementById('seedVal').value) || 12345;
            rng = mulberry32(rngSeed);
        }
        
        function seededRandom() {
            return rng();
        }
        
        function randomizeSeed() {
            document.getElementById('seedVal').value = Math.floor(Math.random() * 1000000);
            resetSim();
        }

        // Gradient images for each layer
        const gradientImages = {
            boundary: null,
            lithium: null,
            neutron: null,
            helium: null,
            tritium: null,
            flash: null
        };
        
        // Offscreen canvas for sampling gradient colours
        const gradientCanvases = {
            boundary: null,
            lithium: null,
            neutron: null,
            helium: null,
            tritium: null,
            flash: null
        };

        function loadGradientImage(layer, event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    gradientImages[layer] = img;
                    
                    // Create offscreen canvas for colour sampling
                    const offCanvas = document.createElement('canvas');
                    offCanvas.width = img.width;
                    offCanvas.height = img.height;
                    const offCtx = offCanvas.getContext('2d');
                    offCtx.drawImage(img, 0, 0);
                    gradientCanvases[layer] = offCtx;
                    
                    document.getElementById(layer + 'GradientStatus').textContent = 'Loaded';
                    render();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function clearGradientImage(layer) {
            gradientImages[layer] = null;
            gradientCanvases[layer] = null;
            document.getElementById(layer + 'GradientStatus').textContent = 'None';
            document.getElementById(layer + 'GradientFile').value = '';
            render();
        }

        function sampleGradientColor(layer, screenX, screenY) {
            const gradCtx = gradientCanvases[layer];
            if (!gradCtx) return null;
            
            const img = gradientImages[layer];
            
            // Map screen position to gradient image position (stretch to fill)
            const imgX = Math.floor((screenX / canvas.width) * img.width);
            const imgY = Math.floor((screenY / canvas.height) * img.height);
            
            // Clamp to image bounds
            const clampedX = Math.max(0, Math.min(img.width - 1, imgX));
            const clampedY = Math.max(0, Math.min(img.height - 1, imgY));
            
            try {
                const pixel = gradCtx.getImageData(clampedX, clampedY, 1, 1).data;
                return `rgb(${pixel[0]}, ${pixel[1]}, ${pixel[2]})`;
            } catch (e) {
                return null;
            }
        }

        function getLayerColor(layer, screenX, screenY, fallbackColorId) {
            const gradientColor = sampleGradientColor(layer, screenX, screenY);
            if (gradientColor) {
                return gradientColor;
            }
            return document.getElementById(fallbackColorId).value;
        }

        // State
        let canvas, ctx;
        let isPlaying = false;
        let currentFrame = 0;
        let animationId = null;
        let lastEmitTime = 0;

        // Particles (now with z coordinate)
        let lithiumParticles = [];
        let neutrons = [];
        let heliumParticles = [];
        let tritiumParticles = [];

        // Canvas center
        let canvasCenterX, canvasCenterY;

        // Initialize
        function init() {
            canvas = document.getElementById('simCanvas');

            updateCanvasCenter();

        function updateCanvasCenter() {
            canvasCenterX = canvas.width / 2;
            canvasCenterY = canvas.height / 2;
        }

        function setupSliderListeners() {
            const sliders = [
                'focalLength', 'rotateX', 'rotateY', 'zoom', 'depthScale', 'depthDarken',

                'productSpeed', 'fadeDistance', 'heliumSize', 'heliumTrailLength', 'heliumTrailOpacity', 'tritiumSize', 'tritiumTrailLength', 'tritiumTrailOpacity',

            ];

            sliders.forEach(id => {

            const colorInputs = ['bgColor', 'boundaryColor', 'lithiumColor', 'neutronColor', 'heliumColor', 'tritiumColor', 'flashColor'];
            colorInputs.forEach(id => {

            const checkboxes = ['showBoundary', 'showLithium', 'showNeutrons', 'showHelium', 'showTritium', 'showFlash'];

        }

        function updateColorPreviews() {
            document.getElementById('boundaryPreview').style.background = document.getElementById('boundaryColor').value;
            document.getElementById('lithiumPreview').style.background = document.getElementById('lithiumColor').value;
            document.getElementById('neutronPreview').style.background = document.getElementById('neutronColor').value;
            document.getElementById('heliumPreview').style.background = document.getElementById('heliumColor').value;

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radial Dot Pattern Generator | Default Office Tools</title>
    <style>
        @font-face {
            font-family: 'SuisseIntl';
            src: url('/fonts/SuisseIntl-Regular.otf') format('opentype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'SuisseIntl';
            src: url('/fonts/SuisseIntl-Medium.otf') format('opentype');
            font-weight: 500;
        }
        @font-face {
            font-family: 'SuisseIntl';
            src: url('/fonts/SuisseIntl-Light.otf') format('opentype');
            font-weight: 300;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SuisseIntl', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 13px;
            background: #fff;
            color: #999;
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            border-right: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid #e8e8e8;
            flex-shrink: 0;
        }

        .back-link {
            display: block;
            color: #999;
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .back-link:hover { color: #000; }

        .sidebar-header h1 {
            font-size: 13px;
            font-weight: 400;
            color: #000;
            line-height: 1.3;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px;
        }
        .sidebar-content::-webkit-scrollbar { width: 0; }

        /* Sections */
        .control-section {
            border-bottom: 1px solid #e8e8e8;
            padding: 14px 0;
        }
        .control-section:last-child { border-bottom: none; }

        .control-section h2 {
            font-size: 11px;
            font-weight: 500;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        /* Control rows */
        .control-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            min-height: 22px;
        }
        .control-row:last-child { margin-bottom: 0; }

        .control-row label {
            flex: 0 0 110px;
            font-size: 13px;
            color: #999;
            line-height: 1;
        }

        /* Range inputs */
        .control-row input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 1px;
            background: #e0e0e0;
            outline: none;
            cursor: pointer;
        }
        .control-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: #000;
            cursor: pointer;
        }
        .control-row input[type="range"]::-moz-range-thumb {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: #000;
            cursor: pointer;
            border: none;
        }

        /* Value display */
        .value-display {
            flex: 0 0 32px;
            font-size: 13px;
            color: #000;
            text-align: right;
        }

        /* Select */
        .control-row select {
            flex: 1;
            border: none;
            border-bottom: 1px solid #e0e0e0;
            font-family: inherit;
            font-size: 13px;
            color: #000;
            background: transparent;
            outline: none;
            cursor: pointer;
            padding: 2px 0;
            -webkit-appearance: none;
        }

        /* Checkboxes */
        .control-row input[type="checkbox"] {
            width: 13px;
            height: 13px;
            cursor: pointer;
            accent-color: #000;
        }

        /* Colour row */
        .color-row {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-top: 6px;
        }
        .color-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .color-item span {
            font-size: 13px;
            color: #999;
        }
        .color-item input[type="color"] {
            width: 24px;
            height: 18px;
            border: 1px solid #e0e0e0;
            padding: 0;
            cursor: pointer;
            background: none;
        }

        /* Presets */
        .preset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }
        .preset-btn {
            padding: 6px 8px;
            border: 1px solid #e0e0e0;
            background: transparent;
            font-family: inherit;
            font-size: 13px;
            color: #999;
            cursor: pointer;
            text-align: center;
        }
        .preset-btn:hover { color: #000; border-color: #000; }

        /* Action buttons */
        .action-row {
            display: flex;
            gap: 8px;
            padding: 14px 0;
        }
        .action-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid #000;
            background: transparent;
            font-family: inherit;
            font-size: 13px;
            color: #000;
            cursor: pointer;
        }
        .action-btn:hover { background: #000; color: #fff; }

        /* Canvas area */
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <a href="/" class="back-link">← Back</a>
            <h1>Radial Dot Pattern Generator</h1>
        </div>
        <div class="sidebar-content">

            <div class="control-section">
                <h2>Canvas</h2>
                <div class="control-row">
                    <label>Size</label>
                    <input type="range" id="canvasSize" min="400" max="1600" value="800" step="100">
                    <span class="value-display" id="sizeValue">800</span>
                </div>
            </div>

            <div class="control-section">
                <h2>Pattern</h2>
                <div class="control-row" id="startDotsControl">
                    <label>Starting dots</label>
                    <input type="range" id="startDots" min="3" max="20" value="8">
                    <span class="value-display" id="startDotsValue">8</span>
                </div>
                <div class="control-row" id="dotIncrementControl">
                    <label>Increment</label>
                    <input type="range" id="dotIncrement" min="0" max="8" value="2" step="1">
                    <span class="value-display" id="dotIncrementValue">2</span>
                </div>
                <div class="control-row">
                    <label>Rings</label>
                    <input type="range" id="numRings" min="5" max="50" value="20">
                    <span class="value-display" id="ringsValue">20</span>
                </div>
                <div class="control-row">
                    <label>Ring spacing</label>
                    <input type="range" id="ringSpacing" min="5" max="40" value="15">
                    <span class="value-display" id="ringSpacingValue">15</span>
                </div>
                <div class="control-row">
                    <label>Inner radius</label>
                    <input type="range" id="innerRadius" min="0" max="150" value="30">
                    <span class="value-display" id="innerRadiusValue">30</span>
                </div>
                <div class="control-row" id="symmetryControl">
                    <label>Radial symmetry</label>
                    <input type="checkbox" id="enforceSymmetry" checked>
                </div>
            </div>

            <div class="control-section">
                <h2>Dots</h2>
                <div class="control-row">
                    <label>Shape</label>
                    <select id="dotShape">
                        <option value="circle">Circle</option>
                        <option value="ring">Ring</option>
                        <option value="square">Square</option>
                        <option value="diamond">Diamond</option>
                        <option value="triangle">Triangle</option>
                        <option value="hexagon">Hexagon</option>
                    </select>
                </div>
                <div class="control-row">
                    <label id="sizeLabel">Base size</label>
                    <input type="range" id="dotSize" min="1" max="20" value="5">
                    <span class="value-display" id="dotSizeValue">5</span>
                </div>
                <div class="control-row">
                    <label>Progression</label>
                    <select id="sizeProgression">
                        <option value="constant">Constant</option>
                        <option value="linear-decrease">Linear −</option>
                        <option value="linear-increase">Linear +</option>
                        <option value="exponential-decrease">Exp −</option>
                        <option value="exponential-increase">Exp +</option>
                        <option value="wave">Wave</option>
                    </select>
                </div>
                <div class="control-row">
                    <label>Size factor</label>
                    <input type="range" id="sizeFactor" min="0.1" max="2" value="0.5" step="0.1">
                    <span class="value-display" id="sizeFactorValue">0.5</span>
                </div>
            </div>

            <div class="control-section" id="alignmentGroup">
                <h2>Rotation</h2>
                <div class="control-row" id="globalRotationControl">
                    <label>Global</label>
                    <input type="range" id="rotation" min="0" max="360" value="0">
                    <span class="value-display" id="rotationValue">0°</span>
                </div>
                <div class="control-row" id="spiralOffsetControl">
                    <label>Spiral offset</label>
                    <input type="range" id="spiralOffset" min="0" max="45" value="0">
                    <span class="value-display" id="spiralValue">0°</span>
                </div>
                <div class="control-row" id="alternateOffsetControl">
                    <label>Alternate offset</label>
                    <input type="checkbox" id="alternateOffset">
                </div>
            </div>

            <div class="control-section">
                <h2>Colour</h2>
                <div class="control-row">
                    <label>Mode</label>
                    <select id="colorMode">
                        <option value="solid">Solid</option>
                        <option value="radial-gradient">Radial gradient</option>
                        <option value="alternating-rings">Alternating rings</option>
                        <option value="alternating-dots">Alternating dots</option>
                        <option value="fade-center">Fade from centre</option>
                        <option value="fade-edge">Fade from edge</option>
                    </select>
                </div>
                <div class="color-row">
                    <div class="color-item">
                        <input type="color" id="color1" value="#000000">
                        <span>Primary</span>
                    </div>
                    <div class="color-item">
                        <input type="color" id="color2" value="#808080">
                        <span>Secondary</span>
                    </div>
                    <div class="color-item">
                        <input type="color" id="backgroundColor" value="#ffffff">
                        <span>BG</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h2>Presets</h2>
                <div class="preset-grid">
                    <button class="preset-btn" onclick="applyPreset('classic')">Classic</button>
                    <button class="preset-btn" onclick="applyPreset('dense')">Dense</button>
                    <button class="preset-btn" onclick="applyPreset('spiral')">Spiral</button>
                    <button class="preset-btn" onclick="applyPreset('halftone')">Halftone</button>
                    <button class="preset-btn" onclick="applyPreset('minimal')">Minimal</button>
                    <button class="preset-btn" onclick="applyPreset('flower')">Flower</button>
                    <button class="preset-btn" onclick="applyPreset('rings')">Rings</button>
                    <button class="preset-btn" onclick="applyPreset('target')">Target</button>
                </div>
            </div>

            <div class="action-row">
                <button class="action-btn" onclick="generatePattern()">Regenerate</button>
                <button class="action-btn" onclick="exportImage()">Export PNG</button>
            </div>

        </div>
    </div>

    <div class="canvas-area">
        <canvas id="patternCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('patternCanvas');
        const ctx = canvas.getContext('2d');

        function updateControlsVisibility() {
            const dotShape = document.getElementById('dotShape').value;
            const isRingMode = dotShape === 'ring';

            document.getElementById('startDotsControl').style.display = isRingMode ? 'none' : 'flex';
            document.getElementById('dotIncrementControl').style.display = isRingMode ? 'none' : 'flex';
            document.getElementById('symmetryControl').style.display = isRingMode ? 'none' : 'flex';
            document.getElementById('alternateOffsetControl').style.display = isRingMode ? 'none' : 'flex';
            document.getElementById('globalRotationControl').style.display = isRingMode ? 'none' : 'flex';
            document.getElementById('spiralOffsetControl').style.display = isRingMode ? 'none' : 'flex';
            document.getElementById('alignmentGroup').style.display = isRingMode ? 'none' : 'block';

            const sizeLabel = document.getElementById('sizeLabel');
            sizeLabel.textContent = isRingMode ? 'Line width' : 'Base size';
        }

        function updateCanvasSize() {
            const size = parseInt(document.getElementById('canvasSize').value);
            canvas.width = size;
            canvas.height = size;
            generatePattern();
        }

        function updateValueDisplays() {
            document.getElementById('sizeValue').textContent = document.getElementById('canvasSize').value;
            document.getElementById('ringsValue').textContent = document.getElementById('numRings').value;
            document.getElementById('startDotsValue').textContent = document.getElementById('startDots').value;
            document.getElementById('dotIncrementValue').textContent = document.getElementById('dotIncrement').value;
            document.getElementById('ringSpacingValue').textContent = document.getElementById('ringSpacing').value;
            document.getElementById('innerRadiusValue').textContent = document.getElementById('innerRadius').value;
            document.getElementById('dotSizeValue').textContent = document.getElementById('dotSize').value;
            document.getElementById('sizeFactorValue').textContent = document.getElementById('sizeFactor').value;
            document.getElementById('rotationValue').textContent = document.getElementById('rotation').value + '°';
            document.getElementById('spiralValue').textContent = document.getElementById('spiralOffset').value + '°';
        }

        function getColorBetween(color1, color2, ratio) {
            const r1 = parseInt(color1.substr(1, 2), 16);
            const g1 = parseInt(color1.substr(3, 2), 16);
            const b1 = parseInt(color1.substr(5, 2), 16);

            const r2 = parseInt(color2.substr(1, 2), 16);
            const g2 = parseInt(color2.substr(3, 2), 16);
            const b2 = parseInt(color2.substr(5, 2), 16);

            const r = Math.round(r1 + (r2 - r1) * ratio);
            const g = Math.round(g1 + (g2 - g1) * ratio);
            const b = Math.round(b1 + (b2 - b1) * ratio);

            return `rgb(${r}, ${g}, ${b})`;
        }

        function drawShape(x, y, size, shape, color, rotation = 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation * Math.PI / 180);
            ctx.fillStyle = color;

            switch(shape) {
                case 'circle':
                    ctx.beginPath();
                    ctx.arc(0, 0, size, 0, Math.PI * 2);
                    ctx.fill();
                    break;

                case 'square':
                    ctx.fillRect(-size, -size, size * 2, size * 2);
                    break;

                case 'diamond':
                    ctx.rotate(45 * Math.PI / 180);
                    ctx.fillRect(-size, -size, size * 2, size * 2);
                    break;

                case 'triangle':
                    ctx.beginPath();
                    ctx.moveTo(0, -size);
                    ctx.lineTo(size, size);
                    ctx.lineTo(-size, size);
                    ctx.closePath();
                    ctx.fill();
                    break;

                case 'hexagon':
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (i * Math.PI * 2) / 6;
                        const px = Math.cos(angle) * size;
                        const py = Math.sin(angle) * size;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                    break;

                case 'ring':
                    break;
            }

            ctx.restore();
        }

        function calculateDotSize(ringIndex, totalRings, baseSize, progression, factor) {
            const ratio = ringIndex / totalRings;
            let size;

            switch(progression) {
                case 'constant':
                    size = baseSize;
                    break;
                case 'linear-decrease':
                    size = baseSize * (1 - ratio * factor * 0.8);
                    break;
                case 'linear-increase':
                    size = baseSize * (1 + ratio * factor);
                    break;
                case 'exponential-decrease':
                    size = baseSize * Math.pow(Math.max(0.2, 1 - factor * 0.5), ratio * 2);
                    break;
                case 'exponential-increase':
                    size = baseSize * Math.pow(1 + factor * 0.5, ratio);
                    break;
                case 'wave':
                    size = baseSize * (1 + Math.sin(ratio * Math.PI * 2) * factor * 0.5);
                    break;
                default:
                    size = baseSize;
            }

            return Math.max(0.5, size);
        }

        function getColor(ringIndex, dotIndex, totalRings, totalDots, colorMode, color1, color2) {
            const ringRatio = ringIndex / totalRings;
            const dotRatio = dotIndex / totalDots;

            switch(colorMode) {
                case 'solid':
                    return color1;
                case 'radial-gradient':
                    return getColorBetween(color1, color2, ringRatio);
                case 'alternating-rings':
                    return ringIndex % 2 === 0 ? color1 : color2;
                case 'alternating-dots':
                    return dotIndex % 2 === 0 ? color1 : color2;
                case 'fade-center':
                    ctx.globalAlpha = Math.max(0.1, 1 - ringRatio * 0.9);
                    return color1;
                case 'fade-edge':
                    ctx.globalAlpha = Math.min(1, ringRatio * 0.9 + 0.1);
                    return color1;
                default:
                    return color1;
            }
        }

        function generatePattern() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const numRings = parseInt(document.getElementById('numRings').value);
            const startDots = parseInt(document.getElementById('startDots').value);
            const dotIncrement = parseInt(document.getElementById('dotIncrement').value);
            const ringSpacing = parseFloat(document.getElementById('ringSpacing').value);
            const innerRadius = parseFloat(document.getElementById('innerRadius').value);
            const dotSize = parseFloat(document.getElementById('dotSize').value);
            const dotShape = document.getElementById('dotShape').value;
            const sizeProgression = document.getElementById('sizeProgression').value;
            const sizeFactor = parseFloat(document.getElementById('sizeFactor').value);
            const globalRotation = parseFloat(document.getElementById('rotation').value);
            const spiralOffset = parseFloat(document.getElementById('spiralOffset').value);
            const alternateOffset = document.getElementById('alternateOffset').checked;
            const enforceSymmetry = document.getElementById('enforceSymmetry').checked;
            const colorMode = document.getElementById('colorMode').value;
            const color1 = document.getElementById('color1').value;
            const color2 = document.getElementById('color2').value;
            const bgColor = document.getElementById('backgroundColor').value;

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            const isRingMode = dotShape === 'ring';
            const maxRadius = Math.min(canvas.width, canvas.height) / 2 - 20;

            for (let ring = 0; ring < numRings; ring++) {
                const radius = innerRadius + (ring * ringSpacing);
                if (radius > maxRadius) break;

                const size = calculateDotSize(ring, numRings, dotSize, sizeProgression, sizeFactor);

                if (isRingMode) {
                    ctx.globalAlpha = 1;
                    const color = getColor(ring, 0, numRings, 1, colorMode, color1, color2);
                    ctx.strokeStyle = color;
                    ctx.lineWidth = size;
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                    ctx.stroke();
                } else {
                    let dotsInRing = Math.max(1, startDots + (ring * dotIncrement));

                    if (enforceSymmetry && startDots > 0 && dotsInRing > 1) {
                        const symmetryFactor = Math.min(startDots, 8);
                        dotsInRing = Math.round(dotsInRing / symmetryFactor) * symmetryFactor;
                        if (dotsInRing < symmetryFactor) dotsInRing = symmetryFactor;
                    }

                    const angleStep = (Math.PI * 2) / dotsInRing;
                    const ringRotationRad = (globalRotation + (ring * spiralOffset)) * Math.PI / 180;
                    const offsetAngle = alternateOffset && (ring % 2 === 1) ? angleStep / 2 : 0;

                    for (let dot = 0; dot < dotsInRing; dot++) {
                        const angle = (dot * angleStep) + ringRotationRad + offsetAngle;
                        const x = centerX + Math.cos(angle) * radius;
                        const y = centerY + Math.sin(angle) * radius;

                        ctx.globalAlpha = 1;
                        const color = getColor(ring, dot, numRings, dotsInRing, colorMode, color1, color2);

                        if (size > 0) drawShape(x, y, size, dotShape, color, 0);
                    }
                }
            }

            ctx.globalAlpha = 1;
        }

        function exportImage() {
            const link = document.createElement('a');
            link.download = `radial-pattern-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        function applyPreset(preset) {
            switch(preset) {
                case 'classic':
                    document.getElementById('numRings').value = 20;
                    document.getElementById('startDots').value = 8;
                    document.getElementById('dotIncrement').value = 2;
                    document.getElementById('ringSpacing').value = 15;
                    document.getElementById('innerRadius').value = 30;
                    document.getElementById('dotSize').value = 5;
                    document.getElementById('dotShape').value = 'circle';
                    document.getElementById('sizeProgression').value = 'linear-decrease';
                    document.getElementById('sizeFactor').value = 0.5;
                    document.getElementById('colorMode').value = 'solid';
                    document.getElementById('color1').value = '#000000';
                    document.getElementById('color2').value = '#808080';
                    document.getElementById('backgroundColor').value = '#ffffff';
                    document.getElementById('alternateOffset').checked = false;
                    document.getElementById('enforceSymmetry').checked = true;
                    document.getElementById('spiralOffset').value = 0;
                    break;
                case 'dense':
                    document.getElementById('numRings').value = 35;
                    document.getElementById('startDots').value = 12;
                    document.getElementById('dotIncrement').value = 3;
                    document.getElementById('ringSpacing').value = 10;
                    document.getElementById('innerRadius').value = 20;
                    document.getElementById('dotSize').value = 4;
                    document.getElementById('dotShape').value = 'circle';
                    document.getElementById('sizeProgression').value = 'constant';
                    document.getElementById('colorMode').value = 'radial-gradient';
                    document.getElementById('enforceSymmetry').checked = true;
                    break;
                case 'spiral':
                    document.getElementById('numRings').value = 25;
                    document.getElementById('startDots').value = 6;
                    document.getElementById('dotIncrement').value = 1;
                    document.getElementById('ringSpacing').value = 12;
                    document.getElementById('spiralOffset').value = 5;
                    document.getElementById('dotShape').value = 'diamond';
                    document.getElementById('sizeProgression').value = 'linear-increase';
                    document.getElementById('enforceSymmetry').checked = false;
                    break;
                case 'halftone':
                    document.getElementById('numRings').value = 30;
                    document.getElementById('startDots').value = 8;
                    document.getElementById('dotIncrement').value = 2;
                    document.getElementById('ringSpacing').value = 12;
                    document.getElementById('innerRadius').value = 10;
                    document.getElementById('dotSize').value = 8;
                    document.getElementById('dotShape').value = 'circle';
                    document.getElementById('sizeProgression').value = 'exponential-decrease';
                    document.getElementById('sizeFactor').value = 0.8;
                    document.getElementById('colorMode').value = 'fade-center';
                    document.getElementById('enforceSymmetry').checked = true;
                    break;
                case 'minimal':
                    document.getElementById('numRings').value = 10;
                    document.getElementById('startDots').value = 4;
                    document.getElementById('dotIncrement').value = 1;
                    document.getElementById('ringSpacing').value = 30;
                    document.getElementById('innerRadius').value = 40;
                    document.getElementById('dotSize').value = 3;
                    document.getElementById('dotShape').value = 'circle';
                    document.getElementById('sizeProgression').value = 'constant';
                    document.getElementById('colorMode').value = 'solid';
                    document.getElementById('enforceSymmetry').checked = true;
                    break;
                case 'flower':
                    document.getElementById('numRings').value = 20;
                    document.getElementById('startDots').value = 8;
                    document.getElementById('dotIncrement').value = 0;
                    document.getElementById('ringSpacing').value = 15;
                    document.getElementById('innerRadius').value = 30;
                    document.getElementById('dotSize').value = 6;
                    document.getElementById('dotShape').value = 'circle';
                    document.getElementById('sizeProgression').value = 'wave';
                    document.getElementById('sizeFactor').value = 0.5;
                    document.getElementById('colorMode').value = 'alternating-dots';
                    document.getElementById('alternateOffset').checked = true;
                    document.getElementById('enforceSymmetry').checked = true;
                    break;
                case 'rings':
                    document.getElementById('numRings').value = 25;
                    document.getElementById('ringSpacing').value = 12;
                    document.getElementById('innerRadius').value = 20;
                    document.getElementById('dotSize').value = 2;
                    document.getElementById('dotShape').value = 'ring';
                    document.getElementById('sizeProgression').value = 'constant';
                    document.getElementById('colorMode').value = 'solid';
                    break;
                case 'target':
                    document.getElementById('numRings').value = 10;
                    document.getElementById('ringSpacing').value = 25;
                    document.getElementById('innerRadius').value = 30;
                    document.getElementById('dotSize').value = 15;
                    document.getElementById('dotShape').value = 'ring';
                    document.getElementById('sizeProgression').value = 'linear-decrease';
                    document.getElementById('sizeFactor').value = 0.7;
                    document.getElementById('colorMode').value = 'alternating-rings';
                    document.getElementById('color1').value = '#ff0000';
                    document.getElementById('color2').value = '#ffffff';
                    break;
            }
            updateValueDisplays();
            updateControlsVisibility();
            generatePattern();
        }

        // Event listeners
        document.getElementById('canvasSize').addEventListener('input', updateCanvasSize);

        document.getElementById('dotShape').addEventListener('change', () => {
            updateControlsVisibility();
            updateValueDisplays();
            generatePattern();
        });

        const controls = [
            'numRings', 'startDots', 'dotIncrement', 'ringSpacing', 'innerRadius',
            'dotSize', 'sizeProgression', 'sizeFactor',
            'rotation', 'spiralOffset', 'alternateOffset', 'enforceSymmetry',
            'colorMode', 'color1', 'color2', 'backgroundColor'
        ];

        controls.forEach(id => {
            const element = document.getElementById(id);
            if (element) {
                element.addEventListener('change', generatePattern);
                if (element.type === 'range') {
                    element.addEventListener('input', () => {
                        updateValueDisplays();
                        generatePattern();
                    });
                }
            }
        });

        // Initialize
        updateCanvasSize();
        updateValueDisplays();
        updateControlsVisibility();
        generatePattern();
    </script>
</body>
</html>

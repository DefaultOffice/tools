<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Default Office — Tools</title>
    <style>
        @font-face {
            font-family: 'SuisseIntl';
            src: url('/fonts/SuisseIntl-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'SuisseIntl';
            src: url('/fonts/SuisseIntl-Medium.otf') format('opentype');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'SuisseIntl';
            src: url('/fonts/SuisseIntl-Light.otf') format('opentype');
            font-weight: 300;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SuisseIntl', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 400;
            font-size: 15px;
            line-height: 1.4;
            color: #000;
            background: #ffffff;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .page {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 80px;
        }

        .logo svg {
            height: 22px;
            width: auto;
            display: block;
        }

        /* Table */
        .tools-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 0.5fr;
            padding: 6px 0;
            font-size: 15px;
            font-weight: 400;
            color: #999;
        }

        .tool-row {
            cursor: pointer;
            user-select: none;
        }

        .tool-row .tool-row-grid {
            color: #999;
        }

        .tool-row:hover .tool-row-grid {
            color: #000;
        }

        .tool-row.active .tool-row-grid {
            color: #000;
        }

        .tool-row-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 0.5fr;
            padding: 6px 0;
            align-items: baseline;
            font-size: 15px;
            font-weight: 400;
        }

        .tool-row-grid .name {
            font-weight: inherit;
        }

        .tool-row-grid .date {
            font-weight: inherit;
        }

        .tool-row-grid .category,
        .tool-row-grid .project,
        .tool-row-grid .owner {
            font-weight: inherit;
        }

        /* Expanded area */
        .tool-expanded {
            display: none;
            padding: 20px 0 30px 0;
        }

        .tool-expanded.open {
            display: block;
        }

        .tool-expanded-inner {
            display: flex;
            gap: 30px;
            max-width: 900px;
        }

        .tool-expanded-thumb {
            flex: 0 0 640px;
            max-width: 640px;
        }

        .tool-expanded-thumb img {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: #f0f0f0;
        }

        .tool-expanded-info {
            flex: 1;
            font-size: 15px;
        }

        .tool-expanded-info a {
            color: #000;
            text-decoration: none;
        }

        .tool-expanded-info a:hover {
            color: #999;
        }

        .tool-expanded-description {
            margin-top: 20px;
            font-size: 15px;
            font-weight: 400;
            color: #000;
            line-height: 1.5;
            max-width: 260px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page {
                padding: 24px;
            }

            .header {
                margin-bottom: 48px;
            }

            .logo svg {
                height: 16px;
            }

            .tools-header {
                grid-template-columns: 2fr 1fr 0.5fr;
                font-size: 11px;
            }

            .tool-row-grid {
                grid-template-columns: 2fr 1fr 0.5fr;
                font-size: 14px;
                padding: 12px 0;
            }

            .tool-row-grid .project,
            .tool-row-grid .owner,
            .tools-header .col-project,
            .tools-header .col-owner {
                display: none;
            }

            .tool-expanded-inner {
                flex-direction: column;
                max-width: 100%;
            }

            .tool-expanded-thumb {
                flex: none;
                max-width: 100%;
            }

            .tool-expanded-description {
                max-width: 100%;
            }
        }
    </style>
</head>

            </div>
        </header>

        <div class="tools-list">
            <div class="tools-header">
                <span>Name</span>
                <span>Category</span>
                <span class="col-project">Project</span>
                <span class="col-owner">Owner</span>
                <span>Date</span>
            </div>

            <div id="tools-container"></div>
        </div>
    </div>

    <script>
        async function loadTools() {
            try {
                const response = await fetch('/tools/registry.json');
                const tools = await response.json();

                // Sort by date descending (YYYY MM DD)
                tools.sort((a, b) => {
                    return b.date.localeCompare(a.date);
                });

                const container = document.getElementById('tools-container');

                tools.forEach(tool => {
                    const row = document.createElement('div');
                    row.className = 'tool-row';
                    row.dataset.tool = tool.folder;

                    const descriptionHtml = tool.description
                        ? `<div class="tool-expanded-description">${tool.description}</div>`
                        : '';

                    row.innerHTML = `
                        <div class="tool-row-grid">
                            <span class="name">${tool.name}</span>
                            <span class="category">${tool.category}</span>
                            <span class="project">${tool.project}</span>
                            <span class="owner">${tool.owner}</span>
                            <span class="date">${tool.date}</span>
                        </div>
                        <div class="tool-expanded" id="expanded-${tool.folder}">
                            <div class="tool-expanded-inner">
                                <div class="tool-expanded-thumb">
                                    <img src="/tools/${tool.folder}/thumbnail.png" alt="${tool.name}">
                                </div>
                                <div class="tool-expanded-info">
                                    <a href="/tools/${tool.folder}/">Open tool</a>
                                    ${descriptionHtml}
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(row);
                });

                // Attach click handlers
                document.querySelectorAll('.tool-row').forEach(row => {
                    row.addEventListener('click', () => {
                        const toolId = row.dataset.tool;
                        const expanded = document.getElementById('expanded-' + toolId);
                        const isOpen = expanded.classList.contains('open');

                        document.querySelectorAll('.tool-expanded').forEach(el => {
                            el.classList.remove('open');
                        });
                        document.querySelectorAll('.tool-row').forEach(r => {
                            r.classList.remove('active');
                        });

                        if (!isOpen) {
                            expanded.classList.add('open');
                            row.classList.add('active');
                        }
                    });
                });
            } catch (e) {
                console.error('Failed to load tools:', e);
            }
        }

        loadTools();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="QuiltPad">
<title>QuiltPad</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --sw:148px;
  --sw2:60px;
  --r:10px;
  --bg:#f4f3f1;
  --bg2:#eae8e5;
  --bg3:#dfddd9;
  --border:#d0cec9;
  --text:#2a2a2c;
  --text2:#8a888c;
  --accent:#7c5cbf;
  --accent2:#6a4baa;
  --canvas-bg:#ffffff;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);touch-action:none;position:fixed;top:0;left:0;color:var(--text)}

.app{display:flex;width:100%;height:100%}

/* ── PRIMARY SIDEBAR ── */
.sidebar{
  width:var(--sw);min-width:var(--sw);height:100%;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:10px;gap:8px;z-index:10;
}
.sb-btn{
  width:128px;height:54px;border-radius:var(--r);border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  font-family:var(--font);font-size:13px;font-weight:600;flex-shrink:0;
}
.sb-btn:active{transform:scale(0.96)}
.sb-btn svg{width:18px;height:18px;flex-shrink:0}
.sb-btn.add{background:var(--accent);color:#fff}
.sb-btn.add:active{background:var(--accent2)}
.sb-btn.util{background:var(--bg3);color:var(--text2)}
.sb-btn.util.on{outline:2px solid var(--accent);outline-offset:-2px;color:var(--accent)}

.swatches{
  flex:1;width:100%;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:4px 0;scrollbar-width:none;
}
.swatches::-webkit-scrollbar{display:none}

.sw{
  width:128px;height:128px;border-radius:var(--r);
  border:3px solid transparent;overflow:hidden;cursor:pointer;
  position:relative;background:var(--bg3);flex-shrink:0;
}
.sw.active{border-color:var(--accent)}
.sw:active{transform:scale(0.97)}
.sw img{width:100%;height:100%;object-fit:cover;pointer-events:none;display:block}
.sw .del{
  position:absolute;top:5px;right:5px;width:24px;height:24px;
  background:rgba(0,0,0,0.5);border-radius:var(--r);
  display:none;align-items:center;justify-content:center;
  font-size:14px;color:#fff;backdrop-filter:blur(4px);
}
.sw.active .del{display:flex}

/* ── TRACE LAYER TOGGLE ── */
.trace-toggle{
  width:128px;height:40px;border-radius:var(--r);
  display:none;flex-shrink:0;overflow:hidden;
  border:1px solid var(--border);
}
.trace-toggle.show{display:flex}
.trace-half{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-family:var(--font);font-size:11px;font-weight:600;
  cursor:pointer;border:none;color:var(--text2);background:var(--bg3);
  transition:background 0.1s,color 0.1s;
}
.trace-half:first-child{border-right:1px solid var(--border)}
.trace-half.on{background:var(--accent);color:#fff}
.trace-half:active{opacity:0.8}

/* ── TOGGLE BUTTONS (reused for Move, Blend) ── */
.toggle-btn{
  width:40px;border-radius:var(--r);overflow:hidden;
  border:1px solid var(--border);flex-shrink:0;
  display:flex;flex-direction:column;
}
.toggle-opt{
  flex:none;height:28px;display:flex;align-items:center;justify-content:center;
  font-family:var(--font);font-size:10px;font-weight:600;
  cursor:pointer;border:none;color:var(--text2);background:var(--bg3);
}
.toggle-opt:first-child{border-bottom:1px solid var(--border)}
.toggle-opt.on{background:var(--accent);color:#fff}
.toggle-opt:active{opacity:0.8}

/* ── SECONDARY SIDEBAR ── */
.sidebar2{
  width:var(--sw2);min-width:var(--sw2);height:100%;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:14px 0;gap:0;z-index:9;
}

/* Section title */
.sb2-title{
  font-family:var(--font);font-size:9px;font-weight:600;
  letter-spacing:0.5px;color:var(--text2);text-align:center;
  flex-shrink:0;
}

/* Brush section — always visible */
.brush-section{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding-bottom:20px;padding-top:0;
}
.brush-section .sb2-title{margin-bottom:2px}

/* Move toggle button */
.move-btn{
  width:40px;height:40px;border-radius:var(--r);border:2px solid var(--border);
  background:var(--bg3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);
}
.move-btn svg{width:20px;height:20px}
.move-btn.on{border-color:var(--accent);background:var(--accent);color:#fff}
.move-btn:active{transform:scale(0.93)}
.bz{
  border:none;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg3);padding:0;
}
.bz.on{background:var(--accent)}
.bz.on .dt{background:#fff}
.bz:active{transform:scale(0.9)}
.bz.s{width:30px;height:30px}
.bz.m{width:36px;height:36px}
.bz.l{width:42px;height:42px}
.dt{border-radius:50%;background:var(--text2)}
.bz.s .dt{width:8px;height:8px}
.bz.m .dt{width:14px;height:14px}
.bz.l .dt{width:20px;height:20px}

.sb2-divider{width:100%;height:1px;background:var(--border);flex-shrink:0}

/* Swatch-specific section — shows/hides, top-aligned */
.swatch-section{
  display:flex;flex-direction:column;align-items:center;
  gap:20px;padding-top:20px;
  visibility:hidden;opacity:0;
}
.swatch-section.show{visibility:visible;opacity:1}

/* Function group: title + control */
.fn{display:flex;flex-direction:column;align-items:center;gap:6px}
.fn label,.sg label{font-family:var(--font);font-size:10px;font-weight:600;letter-spacing:0.5px;color:var(--text2)}
.sg{display:flex;flex-direction:column;align-items:center;gap:6px}
.vs{
  -webkit-appearance:none;appearance:none;
  width:4px;height:100px;background:var(--border);border-radius:2px;outline:none;
  writing-mode:bt-lr;-webkit-writing-mode:vertical-lr;direction:rtl;
}
.vs::-webkit-slider-thumb{
  -webkit-appearance:none;width:22px;height:22px;border-radius:var(--r);
  background:var(--accent);border:2px solid var(--bg2);cursor:pointer;
}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{
  height:46px;display:flex;align-items:center;justify-content:flex-end;
  padding:0 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;
}
.tg{display:flex;align-items:center;gap:6px}
.tb{
  height:34px;padding:0 12px;border:none;border-radius:var(--r);
  background:var(--bg3);color:var(--text2);
  font-family:var(--font);font-size:12px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:5px;
}
.tb:active{background:var(--border)}
.tb svg{width:16px;height:16px}

.cw{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;overflow:hidden;background:var(--bg)}
canvas#c{background:var(--canvas-bg);border-radius:var(--r);box-shadow:0 2px 16px rgba(0,0,0,0.06);touch-action:none;cursor:crosshair}

.toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--text);color:var(--bg);
  padding:8px 18px;border-radius:var(--r);
  font-family:var(--font);font-size:12px;font-weight:500;
  opacity:0;transition:transform 0.25s,opacity 0.25s;z-index:200;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.fh{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <button class="sb-btn add" id="addBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add</button>
    <div class="swatches" id="swatches"></div>
    <div class="trace-toggle" id="traceToggle">
      <button class="trace-half on" id="traceAbove" title="Template above painting">Above</button>
      <button class="trace-half" id="traceBelow" title="Template below painting">Below</button>
    </div>
    <button class="sb-btn util" id="tplBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>Trace</button>
    <button class="sb-btn util" id="eraserBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14.2 2a2 2 0 0 1 2.8 0L21.8 6.8a2 2 0 0 1 0 2.8L11 20"/><path d="M6.5 13.5 11 18"/></svg>Eraser</button>
  </div>

  <div class="sidebar2">
    <div class="brush-section">
      <div class="sb2-title">Brush</div>
      <button class="bz s" data-s="10"><span class="dt"></span></button>
      <button class="bz m on" data-s="26"><span class="dt"></span></button>
      <button class="bz l" data-s="52"><span class="dt"></span></button>
    </div>
    <div class="sb2-divider"></div>
    <div class="swatch-section" id="sliders">
      <div class="fn">
        <div class="sb2-title">Move</div>
        <button class="move-btn" id="moveBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3 3-3 3"/><path d="M12 2l-3 3 3 3"/><path d="M2 12l3-3 3 3"/><path d="M2 12l3 3-3 3"/><path d="M22 12l-3-3-3 3"/><path d="M22 12l-3 3 3 3"/><path d="M12 22l3-3-3-3"/><path d="M12 22l-3-3 3-3"/><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
        </button>
      </div>
      <div class="fn">
        <div class="sb2-title">Blend</div>
        <div class="toggle-btn">
          <button class="toggle-opt on" id="blendOn">On</button>
          <button class="toggle-opt" id="blendOff">Off</button>
        </div>
      </div>
      <div class="sg"><label>Scale</label><input type="range" class="vs" id="sS" min="0.15" max="3" step="0.05" value="1" orient="vertical"></div>
      <div class="sg"><label>Light</label><input type="range" class="vs" id="sB" min="-80" max="80" step="1" value="0" orient="vertical"></div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <div class="tg">
        <button class="tb" id="ubtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M3 13C5.5 8.5 9.7 6 14.5 6c4.4 0 6.5 2.5 6.5 5.5S18.9 17 14.5 17H10"/></svg>Undo</button>
        <button class="tb" id="cbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M5 6v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6"/></svg>Clear</button>
        <button class="tb" id="sbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Save</button>
      </div>
    </div>
    <div class="cw" id="cw"><canvas id="c"></canvas></div>
  </div>
</div>

<input type="file" accept="image/*" class="fh" id="fi">
<input type="file" accept="image/*" class="fh" id="ti">
<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';
const S={sw:[],act:null,er:false,mv:false,br:26,st:[],tpl:null,tplAbove:false,blend:true,mx:60};
let sid=0;
const cv=document.getElementById('c'),x=cv.getContext('2d'),
  cw=document.getElementById('cw'),swEl=document.getElementById('swatches'),
  sliders=document.getElementById('sliders'),
  sS=document.getElementById('sS'),sB=document.getElementById('sB'),
  fi=document.getElementById('fi'),ti=document.getElementById('ti'),
  te=document.getElementById('toast'),
  traceToggle=document.getElementById('traceToggle'),
  traceAbove=document.getElementById('traceAbove'),
  traceBelow=document.getElementById('traceBelow'),
  blendOn=document.getElementById('blendOn'),
  blendOff=document.getElementById('blendOff'),
  moveBtn=document.getElementById('moveBtn');
let W=0,H=0,D=1;

// Resize
function resize(){
  const p=20,mw=cw.clientWidth-p,mh=cw.clientHeight-p,r=4/3;
  let w,h;if(mw/mh>r){h=mh;w=h*r}else{w=mw;h=w/r}
  D=Math.min(window.devicePixelRatio||1,2);
  W=Math.floor(w);H=Math.floor(h);
  cv.style.width=W+'px';cv.style.height=H+'px';
  cv.width=Math.floor(w*D);cv.height=Math.floor(h*D);
  x.setTransform(D,0,0,D,0,0);
  S.sw.forEach(s=>mkPat(s));replay();
}
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(resize,200)});

// Template drawing
function drawTpl(){
  if(!S.tpl)return;
  const i=S.tpl.img,ar=i.width/i.height;
  let dw,dh;if(ar>W/H){dw=W;dh=W/ar}else{dh=H;dw=H*ar}
  x.save();x.globalAlpha=0.18;
  x.drawImage(i,(W-dw)/2,(H-dh)/2,dw,dh);x.restore();
}

// Replay
function replay(){
  x.save();x.setTransform(1,0,0,1,0,0);x.clearRect(0,0,cv.width,cv.height);x.restore();
  x.setTransform(D,0,0,D,0,0);
  if(!S.tplAbove) drawTpl();
  for(let i=0;i<S.st.length;i++) rStroke(S.st[i]);
  if(S.tplAbove) drawTpl();
}
function rStroke(st){
  const sw=S.sw.find(s=>s.id===st.sid);
  x.save();
  if(st.sid==='e'){x.globalCompositeOperation='destination-out';x.fillStyle='rgba(0,0,0,1)'}
  else if(sw&&sw.pat){x.fillStyle=sw.pat}else{x.restore();return}
  const b=st.b,p=st.p;if(!p.length){x.restore();return}
  x.beginPath();x.arc(p[0].x,p[0].y,b/2,0,Math.PI*2);x.fill();
  for(let i=1;i<p.length;i++){
    const a=p[i-1],c=p[i],d=Math.hypot(c.x-a.x,c.y-a.y),n=Math.max(1,(d/(b*.3))|0);
    for(let j=1;j<=n;j++){const t=j/n;x.beginPath();x.arc(a.x+(c.x-a.x)*t,a.y+(c.y-a.y)*t,b/2,0,Math.PI*2);x.fill()}
  }
  x.restore();
}

// Drawing
let dr=false,cs=null,mvStart=null;
function gp(e){const r=cv.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
function dn(e){
  e.preventDefault();
  const p=gp(e);
  // Move mode
  if(S.mv&&S.act){
    dr=true;mvStart=p;return;
  }
  dr=true;
  const id=S.er?'e':S.act;if(!id)return;
  cs={sid:id,b:S.br,p:[p]};
  const sw=S.sw.find(s=>s.id===id);
  x.save();
  if(id==='e'){x.globalCompositeOperation='destination-out';x.fillStyle='rgba(0,0,0,1)'}
  else if(sw&&sw.pat){x.fillStyle=sw.pat}else{x.restore();return}
  x.beginPath();x.arc(p.x,p.y,S.br/2,0,Math.PI*2);x.fill();x.restore();
}
function mmv(e){
  e.preventDefault();if(!dr)return;
  const p=gp(e);
  // Move mode
  if(S.mv&&S.act&&mvStart){
    const sw=S.sw.find(s=>s.id===S.act);
    if(!sw)return;
    sw.ox+=(p.x-mvStart.x);
    sw.oy+=(p.y-mvStart.y);
    mvStart=p;
    mkPat(sw);replay();
    return;
  }
  if(!cs)return;
  const l=cs.p[cs.p.length-1];cs.p.push(p);
  const sw=S.sw.find(s=>s.id===cs.sid),b=S.br;
  x.save();
  if(cs.sid==='e'){x.globalCompositeOperation='destination-out';x.fillStyle='rgba(0,0,0,1)'}
  else if(sw&&sw.pat){x.fillStyle=sw.pat}else{x.restore();return}
  const d=Math.hypot(p.x-l.x,p.y-l.y),n=Math.max(1,(d/(b*.3))|0);
  for(let j=1;j<=n;j++){const t=j/n;x.beginPath();x.arc(l.x+(p.x-l.x)*t,l.y+(p.y-l.y)*t,b/2,0,Math.PI*2);x.fill()}
  x.restore();
}
function up(e){e.preventDefault();if(cs&&cs.p.length){S.st.push(cs);if(S.st.length>S.mx)S.st.shift()}dr=false;cs=null;mvStart=null}
cv.addEventListener('touchstart',dn,{passive:false});
cv.addEventListener('touchmove',mmv,{passive:false});
cv.addEventListener('touchend',up,{passive:false});
cv.addEventListener('touchcancel',up,{passive:false});
cv.addEventListener('mousedown',dn);cv.addEventListener('mousemove',mmv);
cv.addEventListener('mouseup',up);cv.addEventListener('mouseleave',up);

// Patterns
function mkPat(sw){
  const sz=Math.round(256*sw.sc);if(sz<4)return;
  const pc=document.createElement('canvas');pc.width=sz;pc.height=sz;
  const px=pc.getContext('2d');
  // Draw base tile
  px.drawImage(sw.img,0,0,sz,sz);
  // Tile edge blend — crossfade ~8% of edges with opposite side
  if(S.blend){
    const band=Math.max(2,Math.round(sz*0.08));
    px.save();
    // Right edge: blend in left side
    for(let i=0;i<band;i++){
      const a=i/band;
      px.globalAlpha=a;
      px.drawImage(sw.img, 0,0, (1/sz)*sw.img.width,sw.img.height, sz-band+i,0, 1,sz);
    }
    // Bottom edge: blend in top side
    for(let i=0;i<band;i++){
      const a=i/band;
      px.globalAlpha=a;
      px.drawImage(sw.img, 0,0, sw.img.width,(1/sz)*sw.img.height, 0,sz-band+i, sz,1);
    }
    px.restore();
  }
  // Brightness
  if(sw.br!==0){
    px.globalCompositeOperation=sw.br>0?'lighter':'multiply';
    const v=Math.abs(sw.br)/100;
    if(sw.br>0)px.fillStyle=`rgba(255,255,255,${v})`;
    else{const c=Math.round(255*(1-v));px.fillStyle=`rgb(${c},${c},${c})`}
    px.fillRect(0,0,sz,sz);
  }
  sw.pat=x.createPattern(pc,'repeat');
  if(sw.ox||sw.oy){
    sw.pat.setTransform(new DOMMatrix().translateSelf(sw.ox,sw.oy));
  }
}

// Swatch management
function addSw(src){
  const id='s'+(++sid),im=new Image();im.crossOrigin='anonymous';
  im.onload=()=>{
    const s=Math.min(im.width,im.height),ox=(im.width-s)/2,oy=(im.height-s)/2;
    const oc=document.createElement('canvas');oc.width=256;oc.height=256;
    oc.getContext('2d').drawImage(im,ox,oy,s,s,0,0,256,256);
    const sw={id,img:oc,th:oc.toDataURL('image/jpeg',0.75),pat:null,sc:1,br:0,ox:0,oy:0};
    mkPat(sw);S.sw.push(sw);sel(id);toast('Fabric added');
  };im.src=src;
}
function rmSw(id){
  S.sw=S.sw.filter(s=>s.id!==id);S.st=S.st.filter(s=>s.sid!==id);
  if(S.act===id)S.act=null;
  render();replay();toast('Removed');
}
function sel(id){S.act=id;S.er=false;const sw=S.sw.find(s=>s.id===id);if(sw){sS.value=sw.sc;sB.value=sw.br}render()}
function desel(){S.act=null;render()}

function render(){
  swEl.innerHTML='';
  S.sw.forEach(sw=>{
    const d=document.createElement('div');d.className='sw'+(S.act===sw.id?' active':'');
    const im=document.createElement('img');im.src=sw.th;d.appendChild(im);
    const dl=document.createElement('span');dl.className='del';dl.textContent='×';
    dl.addEventListener('click',e=>{e.stopPropagation();rmSw(sw.id)});
    dl.addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();rmSw(sw.id)});
    d.appendChild(dl);
    d.addEventListener('click',()=>{S.act===sw.id?desel():sel(sw.id)});
    swEl.appendChild(d);
  });
  document.getElementById('eraserBtn').classList.toggle('on',S.er);
  document.getElementById('tplBtn').classList.toggle('on',S.tpl!==null);
  sliders.classList.toggle('show',S.act!==null&&!S.er);
  // Trace toggle visibility
  traceToggle.classList.toggle('show',S.tpl!==null);
  traceAbove.classList.toggle('on',S.tplAbove);
  traceBelow.classList.toggle('on',!S.tplAbove);
  blendOn.classList.toggle('on',S.blend);
  blendOff.classList.toggle('on',!S.blend);
  moveBtn.classList.toggle('on',S.mv);
  cv.style.cursor=S.mv?'grab':'crosshair';
}

// Eraser
document.getElementById('eraserBtn').addEventListener('click',()=>{S.er=!S.er;if(S.er)S.act=null;render()});

// Trace layer toggle
traceAbove.addEventListener('click',()=>{if(!S.tplAbove){S.tplAbove=true;render();replay()}});
traceBelow.addEventListener('click',()=>{if(S.tplAbove){S.tplAbove=false;render();replay()}});

// Blend toggle
blendOn.addEventListener('click',()=>{if(!S.blend){S.blend=true;render();S.sw.forEach(s=>mkPat(s));replay()}});
blendOff.addEventListener('click',()=>{if(S.blend){S.blend=false;render();S.sw.forEach(s=>mkPat(s));replay()}});

// Move toggle
moveBtn.addEventListener('click',e=>{e.stopPropagation();S.mv=!S.mv;render()});

// Auto-deselect move when anything else is tapped
document.addEventListener('click',e=>{
  if(!S.mv)return;
  if(e.target===cv||e.target===moveBtn||moveBtn.contains(e.target))return;
  S.mv=false;render();
},true);

// Sliders
function onSc(e){e.stopPropagation();const sw=S.sw.find(s=>s.id===S.act);if(!sw)return;sw.sc=parseFloat(sS.value);mkPat(sw);replay()}
function onBr(e){e.stopPropagation();const sw=S.sw.find(s=>s.id===S.act);if(!sw)return;sw.br=parseInt(sB.value);mkPat(sw);replay()}
sS.addEventListener('input',onSc);sB.addEventListener('input',onBr);
[sS,sB].forEach(s=>{s.addEventListener('touchstart',e=>e.stopPropagation());s.addEventListener('touchmove',e=>e.stopPropagation())});

// Add fabric
document.getElementById('addBtn').addEventListener('click',()=>fi.click());
fi.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=v=>addSw(v.target.result);r.readAsDataURL(f);fi.value=''});

// Template
document.getElementById('tplBtn').addEventListener('click',()=>{
  if(S.tpl){S.tpl=null;replay();render();toast('Template removed')}else ti.click();
});
ti.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=v=>{const i=new Image();i.onload=()=>{S.tpl={img:i};S.tplAbove=false;replay();render();toast('Template added')};i.src=v.target.result};r.readAsDataURL(f);ti.value=''});

// Brush sizes
document.querySelectorAll('.bz').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.bz').forEach(z=>z.classList.remove('on'));b.classList.add('on');S.br=parseInt(b.dataset.s);
}));

// Undo / Clear
document.getElementById('ubtn').addEventListener('click',()=>{if(!S.st.length)return;S.st.pop();replay()});
document.getElementById('cbtn').addEventListener('click',()=>{if(!S.st.length)return;S.st=[];replay();toast('Cleared')});

// Save
document.getElementById('sbtn').addEventListener('click',()=>{
  const ec=document.createElement('canvas');ec.width=cv.width;ec.height=cv.height;
  const ex=ec.getContext('2d');ex.fillStyle='#fff';ex.fillRect(0,0,ec.width,ec.height);ex.drawImage(cv,0,0);
  ec.toBlob(async bl=>{
    if(!bl)return;
    const f=new File([bl],'quiltpad.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[f]})){
      try{await navigator.share({files:[f],title:'QuiltPad'});toast('Shared')}
      catch(e){if(e.name!=='AbortError')dlBlob(bl)}
    }else dlBlob(bl);
  },'image/png');
});
function dlBlob(bl){const a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download='quiltpad-'+Date.now()+'.png';a.click();URL.revokeObjectURL(a.href);toast('Saved')}

let tt;function toast(m){te.textContent=m;te.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>te.classList.remove('show'),1800)}

resize();render();
document.addEventListener('touchmove',e=>{if(e.target===cv||e.target.closest('.cw'))e.preventDefault()},{passive:false});
})();
</script>
</body>
</html>
